services:
  photo-wall:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ${PHOTOS_PATH:-./sample-photos}:/photos:ro
      - ./thumbnails:/app/thumbnails
    environment:
      - PHOTOS_DIR=/photos
      - THUMBNAILS_DIR=/app/thumbnails
      - PORT=8080
    restart: unless-stopped
